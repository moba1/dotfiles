# ───────────── 基本 ─────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"

set -g history-limit 100000
set -g mouse on
set -g focus-events on
set -sg escape-time 0
set -g display-time 2000
set -g display-panes-time 2000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g set-clipboard on

# ───────────── キー ─────────────
# prefix を C-t に変更。fish では未割当、bash readline の transpose-chars だけ潰れる。
set -g prefix C-t
unbind C-b
bind C-t send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded"

# 直感的な分割（カレント cwd を引き継ぐ）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# window 新規は t に割り当て（clock-mode は使わないので上書き）
bind t new-window -c "#{pane_current_path}"
unbind c

# ペイン移動 (vi 風、prefix なしの hjkl は他ツールと衝突するので prefix 付き)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ (prefix + H/J/K/L で繰り返し可)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# copy-mode を vi 風に
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ───────────── 見た目 ─────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# 配色 (256色, 端末非依存)
set -g status-style "bg=colour236,fg=colour250"
set -g window-status-style "bg=colour236,fg=colour244"
set -g window-status-current-style "bg=colour39,fg=colour16,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
# 2 ペイン時に境界線の半分だけ色が変わる既定挙動は分かりづらいので無効化
set -g pane-border-indicators off
# tmux は外周に線を描けないため、背景色で active を示す
# active は端末既定のまま、非 active を暗く沈めてフィルターをかけたように見せる
set -g window-style "bg=#1b1d23,fg=colour245"
set -g window-active-style "bg=terminal,fg=terminal"
set -g message-style "bg=colour39,fg=colour16"

# prefix 押下中はステータス左に [P] を点ける
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[bg=colour203#,fg=colour16#,bold] PREFIX ,#[bg=colour39#,fg=colour16#,bold] #S }#[bg=colour238,fg=colour250] #h "

# 右側: git ブランチ + 日時
# git ブランチは pane_current_path で取得。リポジトリ外は空。
set -g status-right-length 80
set -g status-right "#[fg=colour108]#(cd '#{pane_current_path}' && git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null) #[bg=colour238,fg=colour250] %Y-%m-%d %H:%M "

# ───────────── プラグイン (TPM) ─────────────
# プラグイン本体は XDG_CONFIG (~/.config/tmux/plugins/) に置く。
# TPM は tmux.conf が XDG 配下にあるとそちらを自動で探索先にする。
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect: pane 内容の復元は restore.sh の race で fish と相性が悪く、
# cat の "No such file" エラーが出るため off。構造と cwd は復元される。
set -g @resurrect-capture-pane-contents 'off'
# 保存ファイルは XDG_DATA_HOME に逃がす（既定は ~/.tmux/resurrect で配置がちぐはぐになる）
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
# continuum: tmux 起動時に自動復元（保存間隔は既定の 15 分のまま）
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
